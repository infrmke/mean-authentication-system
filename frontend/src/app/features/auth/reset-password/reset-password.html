<div class="card fade-in">
  <form [formGroup]="form" class="form" (ngSubmit)="onResetSubmit()">
    <app-card-body
      title="Change your password"
      description="Enter a new password below to change your password"
      buttonText="Reset password"
    >
      <app-input-group
        [control]="$any(form.get('password'))"
        label="Password"
        iconName="LockOpen"
        type="password"
        name="password"
        id="reset-password"
        placeholder="Password"
        [required]="true"
      ></app-input-group>

      <app-input-group
        [control]="$any(form.get('confirm_password'))"
        label="Confirm password"
        iconName="Lock"
        type="password"
        name="confirm_password"
        id="reset-confirmPassword"
        placeholder="Repeat your password here..."
        [required]="true"
      ></app-input-group>
    </app-card-body>
  </form>
</div>
